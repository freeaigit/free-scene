name: Publish to PyPI

# Fires on tag push. We force-push tags during history rewrites; PyPI
# rejects re-publishing the same version (immutable by design), so we
# pre-check and skip cleanly if the version is already up. That way
# rewrites + re-tags don't spam workflow-failure emails.
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for PyPI trusted publishing (optional)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package name + version from pyproject.toml
        id: meta
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          print(f"name={d['name']}")
          print(f"version={d['version']}")
          PY

      - name: Skip publish if this version already exists on PyPI
        id: pypi
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/${{ steps.meta.outputs.name }}/${{ steps.meta.outputs.version }}/json")
          if [ "$code" = "200" ]; then
            echo "${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.version }} already on PyPI — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.version }} not yet on PyPI (HTTP $code) — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.pypi.outputs.skip == 'false'
        run: |
          pip install --upgrade build
          python -m build

      - name: Publish
        if: steps.pypi.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
